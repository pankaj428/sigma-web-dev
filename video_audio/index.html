<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video_audio</title>
</head>
<body>
    <video src="mov_bbb.mp4" height="255" controls autoplay loop muted ></video>
    <audio src="Video 10_sachin.mp3" controls preload="auto" >
        <source type="audio/mpeg">
    </audio>
    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" stroke="black" fill="red" stroke-width="2" />
    </svg>
    <svg>
        <ellipse cx="50" cy="40" rx="45" ry="30" fill="yellow" stroke="black"/>
    </svg>
    <svg>
        <line x1="0" y1="0" x2="50" y2="50" stroke="black"/>
    </svg>
    <svg>
        <polygon points="50,0 100,100 0,100" fill="blue"/>
    </svg>
    <img src="img.svg" alt="my svg image">

    <iframe src="https://www.codewithharry.com/tutorial/html-iframes" frameborder="0"></iframe>
    
</body>
</html>
