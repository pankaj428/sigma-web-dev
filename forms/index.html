<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <h1>Form for course</h1>
    <form action="post">
        <div>
            <label for="userid">Name</label>
            <input type="text" id="userid" name="username" placeholder="enter your username">
        </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>.

        </div>
        <div>
            <input type="checkbox" id="sub" name="subscribe" value="yes">
            <label for="sub">Subscribe</label>
        </div>
        <div>
            <textarea name="comment" id="comment" rows="4" cols="50" autofocus required></textarea>
            <label for="comment">Enter your comment</label>
        </div>
        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="mango">Mango</option>
            </select>
        </div>



    </form>



</body>

</html>
