<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entities</title>
</head>
<body>
    <!-- html entities -->
    <!-- &lt; for < and &gt; for > to write the tag as usual -->
    This is a code for paragraph &lt;p&gt;&lt;/p&gt;

    <!-- pre tag prints lines as written -->

    <pre>
        <code>
         This is a para.
         #include&lt;iostream&gt;
         using namespace std;
        </code>




        and this is another para     ---and some more.
    </pre>

    <!-- nbsp for space &copy for copyright symbol -->

    copyright &copy;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;All rights reserved.&amp;

    <blockquote cite="url">
        Quotation 
    </blockquote>
    <q cite="url">quotation</q>
</body>
</html>
